<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣高鐵｜系統暫時繁忙</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-shape shape1"></div>
  <div class="background-shape shape2"></div>

  <main class="container">
    <header class="brand">
      <div class="logo-circle">THSR</div>
      <div class="brand-text">
        <p class="brand-sub">台灣高鐵訂票系統</p>
        <h1>目前使用人數過多，系統暫時繁忙</h1>
      </div>
    </header>

    <section class="card">
      <div class="icon-area">
        <div class="train">🚄</div>
      </div>

      <p class="main-message">
        很抱歉，現在有大量旅客同時進入系統。<br />
        我們正在努力恢復服務，請您稍候再試。
      </p>

      <div class="status-box">
        <p class="status-title">目前狀態</p>
        <p id="statusText" class="status-text">正在重新分流使用者流量...</p>
      </div>

      <div class="timer-section">
        <p class="timer-label">建議稍後再試時間</p>
        <div id="countdown" class="countdown">60</div>
        <p class="timer-unit">秒後可再次嘗試</p>
      </div>

      <div class="progress-section">
        <div class="progress-info">
          <span>系統恢復進度</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressBar" class="progress"></div>
        </div>
      </div>

      <div class="comfort-box">
        <h2>請放心</h2>
        <ul>
          <li>系統繁忙不代表您的操作失敗。</li>
          <li>若您尚未收到付款成功通知，請先不要重複付款。</li>
          <li>建議保留交易畫面或訂單資訊，以便稍後確認。</li>
        </ul>
      </div>

      <div class="action-group">
        <button id="retryBtn" class="primary-btn">重新嘗試</button>
        <button id="infoBtn" class="secondary-btn">查看安撫小提醒</button>
      </div>

      <p id="tipText" class="tip-text hidden">
        小提醒：尖峰時段常因大量使用者同時訂票而導致系統忙碌，稍後 1～2 分鐘再試通常會更順利。
      </p>
    </section>

    <footer class="footer">
      <p>造成不便，敬請見諒。感謝您的耐心等候。</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
