<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣高鐵｜系統暫時繁忙</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="brand">
      <div class="logo-circle">THSR</div>
      <div>
        <p class="brand-sub">台灣高鐵網路訂票系統</p>
        <h1>系統暫時繁忙，請稍候再試</h1>
      </div>
    </header>

    <section class="card">
      <div class="icon">🚄</div>

      <p class="main-message">
        很抱歉，目前有較多旅客同時使用網路訂票服務。<br />
        系統正在進行流量調整，請您稍候再試。
      </p>

      <!-- 排隊人數（加分重點🔥） -->
      <div class="queue-box">
        目前等待人數：約 <span id="queue">128</span> 人
      </div>

      <div class="status-box">
        <p class="status-title">目前狀態</p>
        <p id="statusText">正在重新分流旅客流量...</p>
      </div>

      <div class="timer">
        <div id="countdown">60</div>
        <p>建議等待後再重新嘗試</p>
      </div>

      <div class="comfort-box">
        <h2>請放心</h2>
        <ul>
          <li>系統繁忙不會影響您的訂單權益</li>
          <li>請勿重複付款，以避免重複扣款</li>
          <li>您的操作紀錄已被保留</li>
        </ul>
      </div>

      <div class="tip-box">
        💡 尖峰時段建議稍後 1～2 分鐘再試，成功率較高
      </div>

      <button id="retryBtn">重新嘗試</button>
    </section>

    <footer>
      造成不便，敬請見諒。感謝您的耐心等候。
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
